name: GLaDOS Auto Checkin

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 4 * * *'   # 每日 UTC 4 点签到（北京时间 12 点）
    - cron: '0 0 1 * *'   # 每月 1 号保活空提交

jobs:
  checkin:
    name: GLaDOS 签到
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: glados-checkin
      cancel-in-progress: false

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run checkin
        run: python checkin.py
        env:
          COOKIES: ${{ secrets.COOKIES }}
          SENDKEY: ${{ secrets.SENDKEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          WECOM_BOT_WEBHOOK: ${{ secrets.WECOM_BOT_WEBHOOK }}
          YUNHU_TOKEN: ${{ secrets.YUNHU_TOKEN }}
          YUNHU_RECV_ID: ${{ secrets.YUNHU_RECV_ID }}
          YUNHU_RECV_TYPE: ${{ secrets.YUNHU_RECV_TYPE }}

  keepalive:
    name: 每月空提交保活
    if: github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 创建空提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive to prevent workflow suspension"
          git push
